    <!-- 购物车主体 -->
    <section class="shopping-cart">
        <div class="container">

                <div class="cart-header">我的购物车</div>
                <table class="cart-table">

                            <th>单价</th>
                            <th>小计</th>

                    </thead>
                    <tbody id="cartList">
                        <!-- 购物车商品会通过JS动态渲染 -->
                    </tbody>
                </table>
                <div class="cart-actions">
                    <div class="cart-action-btns">
                        <button id="deleteSelected" class="cart-btn btn-delete">
                            <i class="fas fa-trash-alt"></i> 删除选中商品
                        </button>
                        <button id="clearCart" class="cart-btn btn-clear">

                        </button>

                        </button>
                    </div>
                    <div class="cart-summary">
                        <span class="cart-selected">已选商品 <span id="selectedCount">0</span> 件</span>
                        <span class="cart-total">合计: ¥<span id="totalPrice">0</span></span>

                </div>
            </div>

    <!-- 引入JS文件（主题切换、回到顶部等复用逻辑） -->
    <script src="/labubu/js.js"></script>
    <!-- 购物车专属JS逻辑 -->
    <script>
        // 页面加载时从本地存储读取购物车数据
        document.addEventListener('DOMContentLoaded', function() {
            renderCart();
            bindCartEvents();
        });

        // 购物车数据结构：[{id, name, spec, price, img}]
        function getCartData() {
            const cart = localStorage.getItem('shoppingCart');
            return cart ? JSON.parse(cart) : [];
        }

        // 保存购物车数据到本地存储
        function saveCartData(cart) {
            localStorage.setItem('shoppingCart', JSON.stringify(cart));
        }

        // 渲染购物车商品
        function renderCart() {
            const cartList = document.getElementById('cartList');
            const selectedCountEl = document.getElementById('selectedCount');
            const totalPriceEl = document.getElementById('totalPrice');
            const cart = getCartData();
            
            // 清空表格内容
            cartList.innerHTML = '';
            
            if (cart.length === 0) {
                // 购物车为空时显示提示
                const emptyRow = document.createElement('tr');
                emptyRow.innerHTML = `
                    <td colspan="4" style="padding: 50px; color: #666;">
                        购物车为空，快去<a href="products.html" style="color: var(--secondary-color);">选购商品</a>吧～
                    </td>
                `;
                cartList.appendChild(emptyRow);
                selectedCountEl.textContent = '0';
                totalPriceEl.textContent = '0';
                return;
            }

            // 渲染每个商品
            let totalPrice = 0;
            let selectedCount = 0;

            cart.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="checkbox" class="cart-item-checkbox cart-checkbox" data-index="${index}"></td>
                    <td>
                        <div class="cart-product-info">
                            <img src="${item.img || 'img/default-product.jpg'}" alt="${item.name}" class="cart-product-img">
                            <div>
                                <div class="cart-product-name">${item.name}</div>
                                <div class="cart-product-spec">${item.spec}</div>
                            </div>
                        </div>
                    </td>
                    <td class="cart-price">¥${item.price}</td>
                    <td class="cart-price">¥${item.price}</td>
                `;
                cartList.appendChild(row);

                // 计算总价（默认选中所有商品）
                totalPrice += parseInt(item.price);
                selectedCount++;
                // 默认选中商品
                row.querySelector('.cart-item-checkbox').checked = true;
            });

            // 更新选中数量和总价
            selectedCountEl.textContent = selectedCount;
            totalPriceEl.textContent = totalPrice;
        }

        // 绑定购物车交互事件
        function bindCartEvents() {
            const selectAll = document.getElementById('selectAll');
            const deleteSelected = document.getElementById('deleteSelected');
            const clearCart = document.getElementById('clearCart');
            const cartItemCheckboxes = document.querySelectorAll('.cart-item-checkbox');
            const selectedCountEl = document.getElementById('selectedCount');
            const totalPriceEl = document.getElementById('totalPrice');

            // 全选/取消全选
            selectAll.addEventListener('click', function() {
                const isChecked = this.checked;
                document.querySelectorAll('.cart-item-checkbox').forEach(checkbox => {
                    checkbox.checked = isChecked;
                });
                updateCartSummary();
            });

            // 单个商品选中状态变化
            document.addEventListener('change', function(e) {
                if (e.target.classList.contains('cart-item-checkbox')) {
                    updateCartSummary();
                    // 同步全选框状态
                    const allChecked = document.querySelectorAll('.cart-item-checkbox').length === 
                                      document.querySelectorAll('.cart-item-checkbox:checked').length;
                    selectAll.checked = allChecked;
                }
            });

            // 删除选中商品
            deleteSelected.addEventListener('click', function() {
                const cart = getCartData();
                const selectedIndexes = [];
                
                // 收集选中的商品索引（倒序删除，避免索引错乱）
                document.querySelectorAll('.cart-item-checkbox:checked').forEach(checkbox => {
                    selectedIndexes.push(parseInt(checkbox.getAttribute('data-index')));
                });

                if (selectedIndexes.length === 0) {
                    alert('请先选中要删除的商品');
                    return;
                }

                if (confirm(`确定要删除选中的${selectedIndexes.length}件商品吗？`)) {
                    // 倒序删除商品
                    selectedIndexes.sort((a, b) => b - a).forEach(index => {
                        cart.splice(index, 1);
                    });
                    saveCartData(cart);
                    renderCart();
                    bindCartEvents(); // 重新绑定事件
                }
            });

            // 清空购物车
            clearCart.addEventListener('click', function() {
                const cart = getCartData();
                if (cart.length === 0) {
                    alert('购物车已为空');
                    return;
                }

                if (confirm('确定要清空购物车吗？')) {
                    localStorage.removeItem('shoppingCart');
                    renderCart();
                    bindCartEvents();
                }
            });

            // 更新购物车汇总信息（选中数量和总价）
            function updateCartSummary() {
                const cart = getCartData();
                let selectedCount = 0;
                let totalPrice = 0;

                document.querySelectorAll('.cart-item-checkbox').forEach((checkbox, index) => {
                    if (checkbox.checked) {
                        selectedCount++;
                        totalPrice += parseInt(cart[index].price);
                    }
                });

                selectedCountEl.textContent = selectedCount;
                totalPriceEl.textContent = totalPrice;
            }
        }
    </script>
</body>
